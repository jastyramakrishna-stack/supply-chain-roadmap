<!-- line 8-9: preconnect so Google Fonts DNS resolves before the CSS @import fires -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<!-- line 12-13: preload the hero Unsplash image so the browser fetches it
     in parallel with CSS/JS instead of waiting until styles.css is parsed -->
<link rel="preload" as="image"
  href="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=1400&q=75&auto=format" />
